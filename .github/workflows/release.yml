name: Release

# Build the extension and publish a GitHub Release with the .vsix
# whenever a version tag (e.g. v0.0.2) is pushed.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Package VSIX
        run: npx @vscode/vsce package

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            ./*.vsix \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
